services:
  - type: web
    name: ai-data-analyst-assistant
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run streamlit_app.py --server.address 0.0.0.0 --server.port $PORT --server.headless true
    healthCheckPath: /_stcore/health
    envVars:
      - key: DEBUG
        value: "false"
      - key: HOST
        value: "0.0.0.0"
      - key: UPLOAD_FOLDER
        value: "data/uploads"
      - key: DATABASE_URL
        value: "sqlite:///data/app.db"
